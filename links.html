<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="EditingElements/Favicon_v1.png" />
  <title>3xploreWithUs — Links</title>
  <meta name="description" content="Jason, Mareike & Rocket — living full-time in a self-built expedition truck." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'TypoGraphica';
      src: url('TypoGraphica_demo.otf') format('opentype');
      font-display: swap;
    }
    @font-face { font-family: 'Roboto'; src: url('Roboto/static/Roboto-Light.ttf') format('truetype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Roboto'; src: url('Roboto/static/Roboto-Regular.ttf') format('truetype'); font-weight: 400; font-display: swap; }
    :root {
      --teal: #1A9090; --teal-lt: #5AC8C8;
      --sand: #D4A96A; --sand-lt: #EDD9A3;
      --dark: #0D1515; --dark-2: #131C1C;
      --text: #EDE8DC; --muted: #72888A; --white: #F5F2EC;
      --fd: 'TypoGraphica', 'Montserrat', sans-serif;
      --fb: 'Roboto', 'Montserrat', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: var(--fb);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .links-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .links-logo {
      width: 180px;
      height: 180px;
      margin-bottom: 1.25rem;
    }
    .links-logo img { width: 100%; height: 100%; object-fit: contain; }

    /* Name */
    .links-name {
      font-family: var(--fd);
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    /* Tagline */
    .links-tagline {
      font-family: var(--fb);
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 2.5rem;
    }

    /* Link buttons */
    .links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin-bottom: 2.5rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      width: 100%;
      padding: 1rem 1.4rem;
      border-radius: 4px;
      border: 1px solid rgba(90,200,200,0.2);
      background: rgba(26,144,144,0.07);
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }
    .link-btn:hover {
      border-color: rgba(90,200,200,0.6);
      background: rgba(26,144,144,0.15);
      transform: translateY(-2px);
    }
    .link-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      color: var(--teal-lt);
    }
    .link-btn-text {
      flex: 1;
    }
    .link-btn-label {
      font-family: var(--fd);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      display: block;
    }
    .link-btn-sub {
      font-family: var(--fb);
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      display: block;
      margin-top: 0.1rem;
    }
    .link-btn-arrow {
      color: var(--muted);
      flex-shrink: 0;
    }
    .link-btn-arrow svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Divider */
    .links-divider {
      width: 40px;
      height: 2px;
      background: rgba(90,200,200,0.2);
      border-radius: 2px;
      margin-bottom: 2rem;
    }

    /* Social row */
    .links-socials {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .links-social {
      color: var(--muted);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }
    .links-social:hover { color: var(--teal-lt); }
    .links-social svg { width: 22px; height: 22px; }

    /* Footer */
    .links-footer {
      font-family: var(--fb);
      font-size: 0.63rem;
      color: rgba(114,136,138,0.35);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="links-wrap">

  <span class="links-name">3xploreWithUs</span>

      <span class="link-btn-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>

      <div class="link-btn-text">

  <div class="links-divider"></div>

  <div class="links-socials">
    <a href="https://www.youtube.com/@3xplorewithus" target="_blank" class="links-social" aria-label="YouTube">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.8 8s-.2-1.5-.8-2.1c-.8-.8-1.7-.8-2.1-.9C16.2 5 12 5 12 5s-4.2 0-7 .2c-.4 0-1.3.1-2.1.9-.6.6-.8 2.1-.8 2.1S2 9.7 2 11.3v1.5c0 1.6.2 3.2.2 3.2s.2 1.5.8 2.1c.8.8 1.8.8 2.2.8C6.8 19 12 19 12 19s4.2 0 7-.2c.4 0 1.3-.1 2.1-.9.6-.6.8-2.1.8-2.1s.2-1.6.2-3.2v-1.5C22 9.7 21.8 8 21.8 8zM10 15V9l5.5 3L10 15z"/></svg>

    <a href="mailto:adventure@3xplorewithus.com" class="links-social" aria-label="Email">

</body>
</html>
